<!-- Contenedor principal del select -->
 <div class = "flex flex-col gap-1">

    <!-- Contenedor principal del select -->
     @if(label()) {
        <label class = "font-orbitron text-xs text-portal tracking-wide"> {{label()}} </label>
     } 
    
     <!-- Estado de carga: muestra skeleton o select -->
     @if(loading()) {
        <div class = "h-10 rounded-lg bg-spaceLight animate-pulse"></div>
     } @else {
        <!-- Select principal -->
         <select 
         [disabled] = "disabled()"
         [value] = "value() ?? ''"
         (change) = "handleChange($event)"
         class = "font-exo bg-spaceLight text-gray-200 border-2 border-spaceLight rounded-lg px-3 py-2 cursor-pointer transition-all duration-200 focus:outline-none focus:border-portal disabled:opacity-50 disabled:cursor-not-allowed">
        
         <!-- PlaceHolder -->
          <option value='' disabled>{{placeholder()}}</option>

          <!-- Opciones -->
           @for (option of options(); track option.value){
            <option [value]="option.value">{{option.label}}</option>
           }
        </select>
     }
 </div>
