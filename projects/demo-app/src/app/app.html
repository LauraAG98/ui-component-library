<!-- Fondo principal de la app -->
 <div class = "min-h-screen bg-space font-exo">

  <!-- Contenedor donde se mostrarán las estrellas dinámicas -->
  <div class="stars" id="stars"></div>

 <!-- Header -->
  <header class = "border-b border-spaceLight font-black tracking-widest text-center py-10">
    <h1 class = "font-orbitron text-4xl text-portal tracking-widest">
    <span class="text-rick">Rick </span>
    <span class="text-morty">&amp; Morty </span>
    <span class="text-portal drop-shadow-[0_0_10px_#97ce4c]">Explorer</span></h1>
  </header>

  <!-- Contenido principal -->
   <main class = "px-6 py-8 max-w-7xl mx-auto">

    <!-- Filtros -->
     <div class = "flex flex-col sm:flex-row gap-4 mb-8">
      <ui-select
        label="¿Qué deseas buscar?"
        placeholder="Selecciona una categoría..."
        [options]="resourceOptions"
        [value]="activeResource()"
        (selectionChange) = "onResourceChange($event)">
      </ui-select>

      <ui-select
        label="Estado del personaje"
        placeholder="Selecciona una opción..."
        [disabled]="isStatusDisabled()"
        [options]="statusOptions"
        (selectionChange) = "onStatusChange($event)">
      </ui-select>
     </div>

     <!-- Tabla -->
      <ui-table
        [columns]="columns()"
        [rows]="rows()"
        [loading]="loading()"
        [errorMessage]="errorMessage()"
        emptyMessage= "No se encontraron resultados"
        (actionTriggered) = "onActionTriggered($event)">
    </ui-table>
   </main>

   <!-- Modal -->
    @if(selectedRow()){
      <div class = "fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4" (click) = "closeModal()">
        <div class = "w-full max-w-lg" (click) = "$event.stopPropagation()">
          <ui-card title="Detalle" elevation="raised">

            <div class = "flex flex-col gap-2 max-h-[80vh] overflow-y-auto pr-2">
              @if(selectedRow()!['image']) {
                <img [src] = "selectedRow()!['image']" class = "w-20 h-20 rounded-full border-2 border-portal mb-4">
              }

              @for(entry of objectEntries(selectedRow()!); track entry [0]){
                @if(!isObject(entry[1]) && entry[1] !== ''){
                  <div class = "flex gap-2">
                    <span class = "font-orbitron text-xs text-portal min-w-32">{{getLabel (entry[0])}}</span>
                    <span class = "font-exo text-sm text-gray-200">{{entry[1]}}</span>
                  </div>
                }
              }
            </div>

            <div class = "mt-4">
              <ui-button label="Cerrar" variant="secondary" (clicked)="closeModal()"></ui-button>
            </div>
          </ui-card>
        </div>
      </div>
    }

</div>
